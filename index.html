<div class="form-group">
    <label>Tanggal *</label>
    <input type="date" id="formTanggal" required />
</div>

<div class="form-group">
    <label>Keterangan *</label>
    <input type="text" id="formKeterangan" placeholder="Contoh: Belanja Banner" required />
</div>

<div class="form-group">
    <label>Nominal *</label>
    <input type="number" id="formNominal" placeholder="Masukkan nominal" required min="0" />
</div>

<div class="form-row">
    <div class="form-group">
        <label>Kategori *</label>
        <select id="formKategori" required onchange="toggleMetode()">
            <option value="SPJ">SPJ</option>
            <option value="TAKTIS">TAKTIS</option>
        </select>
    </div>
    <div class="form-group">
        <label>Tipe *</label>
        <select id="formTipe" required onchange="toggleMetode()">
            <option value="Pemasukan">Pemasukan</option>
            <option value="Pengeluaran">Pengeluaran</option>
        </select>
    </div>
</div>

<!-- Metode (khusus SPJ + Pengeluaran) -->
<div class="form-group" id="metodeGroup" style="display:none;">
    <label>Metode Pembayaran</label>
    <select id="formMetode">
        <option value="Tunai">Tunai</option>
        <option value="Non Tunai">Non Tunai</option>
    </select>
    <small style="color:#999;display:block;margin-top:4px;">Hanya untuk pengeluaran SPJ</small>
</div>
